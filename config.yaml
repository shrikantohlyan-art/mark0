backend:
  host: 127.0.0.1
  port: 8001
  debug: false
  workers: 1
  reload: false

frontend:
  host: localhost
  port: 5173
  debug: false

models:
  default: qwen2.5:7b
  gemini_model: gemini-2.5-flash
  ollama_host: localhost
  ollama_port: 11434
  # RTX 3050 6GB: one model loaded = fast; four models = VRAM thrashing (5-15s cold start each switch)
  preferred_model_order:
    - qwen2.5:7b
  model_timeouts:
    qwen2.5:7b: 90

timeouts:
  chat_request_seconds: 120
  local_model_seconds: 120
  api_call_seconds: 30

logging:
  level: INFO
  path: logs
  file: jarvis.log
  max_bytes: 10485760
  backup_count: 5

features:
  enable_voice: true
  enable_code_execution: true
  use_local_models: true
  use_cloud_models: false
  fallback_to_cloud: false
  enable_legacy_agent_fallback: false
  enable_training_mode: false
  enable_screen_watcher: false
  enable_daily_learner: false
  training_mode_vision_provider: local
  screen_watcher_interval_seconds: 300

autonomy:
  policy: supervised
  trusted_commands:
    - open_application
    - get_current_time
    - get_weather
    - search_web
    - take_screenshot
    - get_system_info
    - read_file
    - list_directory
    - play_music
    - send_whatsapp_message
    - post_to_social_media
    - check_inventory
    - generate_invoice
    - manage_bookings
    - customer_lookup

cloud:
  call_limits:
    per_request: 1
    per_session: 5
    per_minute: 2
    per_hour: 10
